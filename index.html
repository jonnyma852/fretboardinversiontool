<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fretboard Inversion Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111317; --surface: #1c1e24; --border: #2e3038;
  --text: #e2e4ec; --muted: #666a7a; --accent: #e8b84b;
  --g0:#222;    --g0b:#888;
  --g1:#3b8ff5; --g1b:#6aadff;
  --g2:#e8437a; --g2b:#ff7aaa;
  --g3:#3cb86a; --g3b:#70e098;
  --g4:#e8952a; --g4b:#ffbc5a;
  --g5:#a855f7; --g5b:#cc88ff;
  --g6:#26c9c9; --g6b:#5aeaea;
  --g7:#e8e84b; --g7b:#ffff88;
  --g8:#e05252; --g8b:#ff8888;
}

body {
  background: var(--bg); color: var(--text);
  font-family: 'IBM Plex Mono', monospace; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 12px 50px; gap: 0;
}

header { text-align: center; margin-bottom: 8px; }
header h1 { font-size: 1.56rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }

.global-controls {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center;
  padding: 6px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 8px; width: 100%; max-width: 860px;
}
.gc-label { font-size: 1.0rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.gc-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

.chord-instances { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; }

.chord-instance {
  width: 100%; max-width: 1200px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px 12px; display: flex; flex-direction: column; gap: 6px;
}

.chord-bar {
  display: none; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; flex-wrap: wrap;
}
.chord-bar-name { font-size: 1.31rem; font-weight: 700; color: var(--accent); white-space: nowrap; flex-shrink: 0; min-width: 120px; }
.chord-bar-spacer { flex: 1; }
.chord-bar-root { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; justify-content: center; flex-shrink: 0; }
.root-label { font-size: 0.94rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.chord-bar-btns { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

@media (max-width: 680px) {
  .chord-bar { flex-direction: column; align-items: stretch; }
  .chord-bar-name { min-width: unset; }
  .chord-bar-spacer { display: none; }
  .chord-bar-btns { justify-content: flex-end; }
}

.root-pill {
  font-family: 'IBM Plex Mono', monospace; font-size: 1.025rem; font-weight: 700;
  padding: 2px 8px; border-radius: 20px; cursor: pointer; user-select: none;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  transition: border-color 0.12s, background 0.12s, color 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.root-pill:hover     { border-color: var(--accent); color: var(--text); }
.root-pill.in-chord  { border-color: #555; color: var(--text); }
.root-pill.selected  { background: var(--accent); border-color: var(--accent); color: #111; }
.root-pill.auto-pill { border-style: dashed; }
.root-pill.auto-pill.selected { background: var(--surface); border-color: var(--accent); color: var(--accent); border-style: solid; }

.status-empty {
  font-size: 1.1rem; color: var(--muted);
  padding: 5px 12px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; text-align: center;
}

.btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 6px 13px; border-radius: 5px; font-family: 'IBM Plex Mono', monospace;
  font-size: 1.1rem; cursor: pointer; white-space: nowrap;
  transition: border-color 0.15s, background 0.15s, opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover  { border-color: var(--accent); background: #222530; }
.btn:active { opacity: 0.75; }
.btn.red    { border-color: #e84361; color: #e84361; }
.btn.red:hover { background: #1e1018; }
.btn.audio-on  { border-color: #3cb86a; color: #3cb86a; background: #0e1f14; }
.btn.audio-on:hover { background: #142a1a; }
.btn.accent-outline { border-color: var(--accent); color: var(--accent); }
.btn.accent-outline:hover { background: #221f10; }
.btn.accent-outline:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--border); color: var(--muted); }
.btn.accent-outline.strumming { background: #2a2210; border-color: #ffdd88; color: #ffdd88; }
.btn.toggle-active { background: #1d2535; border-color: #6aadff; color: #6aadff; }
.btn.remove-btn { color: var(--muted); font-size: 0.975rem; }
.btn.remove-btn:hover { border-color: #e84361; color: #e84361; background: #1e1018; }

.vol-wrap {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 5px; padding: 4px 10px;
}
input[type=range].vol-slider {
  -webkit-appearance: none; appearance: none;
  width: 80px; height: 4px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range].vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 15px; height: 15px; border-radius: 50%; background: var(--accent); cursor: pointer;
}
input[type=range].vol-slider::-moz-range-thumb {
  width: 15px; height: 15px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer;
}
.vol-pct { font-size: 0.975rem; color: var(--muted); width: 36px; text-align: right; }

.fb-scroll { width: 100%; overflow-x: auto; padding-bottom: 8px; padding-top: 6px; text-align: center; }
@media (max-width: 900px) {
  .fb-scroll { overflow-x: hidden; }
  .fb-wrap   { transform-origin: top left; }
}
.fb-wrap { display: inline-flex; flex-direction: column; }

.fret-nums-row { display: flex; margin-left: 1px; margin-bottom: 4px; }
.fret-num-cell { font-size: 0.875rem; color: var(--muted); text-align: center; flex-shrink: 0; user-select: none; }

.fretboard {
  background: #fff; border: 2px solid #c0c0c0; border-right: none; border-radius: 3px;
  display: inline-flex; flex-direction: column; position: relative; overflow: visible;
  margin-top: 8px; margin-bottom: 8px; padding-right: 24px;
}
.fretboard::before, .fretboard::after {
  content: ''; position: absolute; left: -2px; right: -2px; height: 12px;
  background: #fff; border-left: 2px solid #c0c0c0; z-index: 0;
}
.fretboard::before { bottom: 100%; }
.fretboard::after  { top: 100%; }

.string-row { display: flex; align-items: center; position: relative; height: 46px; overflow: visible; }
.string-row.top-string .fret-cell::before {
  content: ''; position: absolute; top: 0; left: -6px; right: 100%;
  height: calc(50% - 1px); background: #fff; z-index: 3; pointer-events: none;
}
.string-row.bottom-string .fret-cell::before {
  content: ''; position: absolute; bottom: 0; left: -6px; right: 100%;
  height: calc(50% - 1px); background: #fff; z-index: 3; pointer-events: none;
}
.string-row::after {
  content: ''; position: absolute; left: 40px; right: 0; top: 50%; transform: translateY(-50%);
  pointer-events: none; z-index: 1; background: rgba(0,0,0,0.22);
}
.string-row[data-s="0"]::after { height: 3px; }
.string-row[data-s="1"]::after { height: 2.4px; }
.string-row[data-s="2"]::after { height: 1.9px; }
.string-row[data-s="3"]::after { height: 1.5px; }
.string-row[data-s="4"]::after { height: 1.1px; }
.string-row[data-s="5"]::after { height: 0.8px; }

.string-name {
  width: 40px; text-align: center; font-size: 1.06rem; font-weight: 700; color: #888;
  flex-shrink: 0; user-select: none; position: relative; z-index: 3; background: #fff;
  cursor: pointer; height: 46px; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.fret-cell {
  flex-shrink: 0; height: 46px; border-right: 2px solid #aaa; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 2; overflow: visible;
  -webkit-tap-highlight-color: transparent;
}
.fret-cell.nut { border-left: 5px solid #777; }
.fret-cell.inv-hover, .string-name.inv-hover { background: rgba(232,184,75,0.10) !important; }

.fret-marker {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 9px; height: 9px; border-radius: 50%; background: rgba(0,0,0,0.13); pointer-events: none; z-index: 10;
}
.fret-marker.below        { bottom: 0; }
.fret-marker.below.left   { bottom: 0; left: calc(50% - 8px); }
.fret-marker.below.right  { bottom: 0; left: calc(50% + 8px); }
.fret-marker.above        { top: 0; }
.fret-marker.above.left   { top: 0; left: calc(50% - 8px); }
.fret-marker.above.right  { top: 0; left: calc(50% + 8px); }
.fret-marker.middle       { top: calc(100% - 3px); }
.fret-marker.middle.left  { top: calc(100% - 3px); left: calc(50% - 8px); }
.fret-marker.middle.right { top: calc(100% - 3px); left: calc(50% + 8px); }

.dot {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.775rem; font-weight: 700; line-height: 1; text-align: center;
  position: relative; z-index: 7; white-space: nowrap; pointer-events: none;
  transition: transform 0.1s, box-shadow 0.1s;
}
.dot.inv-clickable { pointer-events: auto; cursor: pointer; }
.dot.inv-clickable:hover  { transform: scale(1.18); box-shadow: 0 0 8px 2px rgba(255,255,255,0.25); }
.dot.inv-clickable:active { transform: scale(1.05); }
.dot-g0 { background: var(--g0); border: 2px solid var(--g0b); color: #fff; }
.dot-g1 { background: var(--g1); border: 2px solid var(--g1b); color: #fff; }
.dot-g2 { background: var(--g2); border: 2px solid var(--g2b); color: #fff; }
.dot-g3 { background: var(--g3); border: 2px solid var(--g3b); color: #fff; }
.dot-g4 { background: var(--g4); border: 2px solid var(--g4b); color: #111; }
.dot-g5 { background: var(--g5); border: 2px solid var(--g5b); color: #fff; }
.dot-g6 { background: var(--g6); border: 2px solid var(--g6b); color: #111; }
.dot-g7 { background: var(--g7); border: 2px solid var(--g7b); color: #111; }
.dot-g8 { background: var(--g8); border: 2px solid var(--g8b); color: #fff; }

.legend { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 1.025rem; color: var(--muted); }
.legend-sw { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }

.interval-key { font-size: 0.975rem; color: var(--muted); text-align: center; line-height: 2.1; max-width: 760px; }
.interval-key b { color: #9ab4e8; }

.add-chord-wrap { display: flex; justify-content: center; margin: 12px 0 4px; }
.add-chord-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 26px; border-radius: 8px; font-size: 1.19rem;
  border: 1px dashed var(--accent); color: var(--accent); background: transparent;
  font-family: 'IBM Plex Mono', monospace; cursor: pointer; letter-spacing: 0.05em;
  transition: background 0.15s; -webkit-tap-highlight-color: transparent;
}
.add-chord-btn:hover { background: #221f10; }

@media (max-width: 600px) {
  body { padding: 8px 8px 50px; }
  .chord-instance { padding: 8px 10px 10px; }
  .btn { font-size: 1.0rem; padding: 5px 9px; }
  header h1 { font-size: 1.3rem; }
}
</style>
</head>
<body>

<header>
  <h1>Fretboard Inversion Tool</h1>
</header>

<div class="global-controls">
  <span class="gc-label">Audio</span>
  <button class="btn" id="globalAudioBtn" onclick="toggleGlobalAudio()">🔇 Off</button>
  <div id="globalVolWrap" style="opacity:0.35;pointer-events:none;transition:opacity 0.2s;">
    <div class="vol-wrap">
      <span style="font-size:1.1rem;">🔈</span>
      <input type="range" class="vol-slider" id="globalVolSlider" min="0" max="100" value="70" oninput="onGlobalVolume(this.value)">
      <span class="vol-pct" id="globalVolPct">70%</span>
    </div>
  </div>
  <div class="gc-divider"></div>
  <button class="btn" id="globalNotesBtn" onclick="toggleGlobalNotes()">♩ Intervals</button>
</div>

<div class="chord-instances" id="chordInstances"></div>

<div class="add-chord-wrap">
  <button class="add-chord-btn" onclick="addChordInstance()">＋ Add Chord</button>
</div>

<div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:18px;width:100%;max-width:800px;">
  <div class="legend">
    <div class="legend-item"><div class="legend-sw" style="background:#222;border:2px solid #888"></div>Your shape</div>
    <div class="legend-item"><div class="legend-sw" style="background:var(--g1)"></div>Inv 1</div>
    <div class="legend-item"><div class="legend-sw" style="background:var(--g2)"></div>Inv 2</div>
    <div class="legend-item"><div class="legend-sw" style="background:var(--g3)"></div>Inv 3</div>
    <div class="legend-item"><div class="legend-sw" style="background:var(--g4)"></div>Inv 4</div>
    <div class="legend-item"><div class="legend-sw" style="background:var(--g5)"></div>Inv 5</div>
    <div class="legend-item"><div class="legend-sw" style="background:var(--g6)"></div>Inv 6</div>
    <div class="legend-item"><div class="legend-sw" style="background:var(--g7)"></div>Inv 7</div>
    <div class="legend-item"><div class="legend-sw" style="background:var(--g8)"></div>Inv 8</div>
  </div>
  <div class="interval-key">
    <b>R</b>=Root · <b>△3</b>=Maj 3rd · <b>m3</b>=Min 3rd · <b>p5</b>=Perf 5th · <b>b5</b>=Flat 5th ·
    <b>#5</b>=Aug 5th · <b>△7</b>=Maj 7th · <b>m7</b>=Min 7th · <b>°7</b>=Dim 7th · <b>6</b>=6th · <b>9</b>=9th
  </div>
</div>

<script>
const NOTES      = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NUM_FRETS  = 23, FRET_W = 44;
const OPEN       = [4,9,2,7,11,4]; // E A D G B e  (string 0=low E … 5=high e)
const SNAMES     = ['E','A','D','G','B','e'];
const OPEN_MIDI  = [40,45,50,55,59,64];
const NUM_GROUPS = 9;

const CHORD_LIBRARY = [
  { ivs:[0,4,7],      name:'Major',       lb:{0:'R',4:'△3',7:'p5'} },
  { ivs:[0,3,7],      name:'Minor',       lb:{0:'R',3:'m3',7:'p5'} },
  { ivs:[0,4,8],      name:'Augmented',   lb:{0:'R',4:'△3',8:'#5'} },
  { ivs:[0,3,6],      name:'Diminished',  lb:{0:'R',3:'m3',6:'b5'} },
  { ivs:[0,2,7],      name:'Sus2',        lb:{0:'R',2:'2',7:'p5'} },
  { ivs:[0,5,7],      name:'Sus4',        lb:{0:'R',5:'4',7:'p5'} },
  { ivs:[0,4,7,11],   name:'Major 7',     lb:{0:'R',4:'△3',7:'p5',11:'△7'} },
  { ivs:[0,3,7,10],   name:'Minor 7',     lb:{0:'R',3:'m3',7:'p5',10:'m7'} },
  { ivs:[0,4,7,10],   name:'Dom 7',       lb:{0:'R',4:'△3',7:'p5',10:'m7'} },
  { ivs:[0,3,6,9],    name:'Dim 7',       lb:{0:'R',3:'m3',6:'b5',9:'°7'} },
  { ivs:[0,3,6,10],   name:'Half-Dim ø7', lb:{0:'R',3:'m3',6:'b5',10:'m7'} },
  { ivs:[0,4,8,10],   name:'Aug 7',       lb:{0:'R',4:'△3',8:'#5',10:'m7'} },
  { ivs:[0,4,8,11],   name:'Aug Maj7',    lb:{0:'R',4:'△3',8:'#5',11:'△7'} },
  { ivs:[0,3,7,11],   name:'Min Maj7',    lb:{0:'R',3:'m3',7:'p5',11:'△7'} },
  { ivs:[0,2,7,10],   name:'Sus2 7',      lb:{0:'R',2:'2',7:'p5',10:'m7'} },
  { ivs:[0,5,7,10],   name:'Sus4 7',      lb:{0:'R',5:'4',7:'p5',10:'m7'} },
  { ivs:[0,4,7,9],    name:'Major 6',     lb:{0:'R',4:'△3',7:'p5',9:'6'} },
  { ivs:[0,3,7,9],    name:'Minor 6',     lb:{0:'R',3:'m3',7:'p5',9:'6'} },
  { ivs:[0,4,7,11,2], name:'Major 9',     lb:{0:'R',4:'△3',7:'p5',11:'△7',2:'9'} },
  { ivs:[0,3,7,10,2], name:'Minor 9',     lb:{0:'R',3:'m3',7:'p5',10:'m7',2:'9'} },
  { ivs:[0,4,7,10,2], name:'Dom 9',       lb:{0:'R',4:'△3',7:'p5',10:'m7',2:'9'} },
  { ivs:[0,4,7,11,5], name:'Major 11',    lb:{0:'R',4:'△3',7:'p5',11:'△7',5:'11'} },
  { ivs:[0,4,7,2],    name:'Add9',        lb:{0:'R',2:'9',4:'△3',7:'p5'} },
  { ivs:[0,3,7,2],    name:'Min Add9',    lb:{0:'R',2:'9',3:'m3',7:'p5'} },
];

function genericLabel(iv){
  return ({0:'R',1:'b2',2:'2',3:'m3',4:'△3',5:'4',6:'b5',7:'p5',8:'#5',9:'6',10:'m7',11:'△7'})[iv]??String(iv);
}

const SINGLE_MARKER_FRETS = new Set([3,5,7,9,15,17,19,21]);
const DOUBLE_MARKER_FRETS  = new Set([12]);

function noteAt(s,f){ return (OPEN[s]+f)%12; }
function midiToHz(m){ return 440*Math.pow(2,(m-69)/12); }

let audioCtx=null, masterGain=null;
let audioEnabled=false, currentVolume=0.70;

function getAudioCtx(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=currentVolume;
    masterGain.connect(audioCtx.destination);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function ksPluck(midi,string,when=0){
  const ctx=getAudioCtx(),freq=midiToHz(midi),sr=ctx.sampleRate;
  const period=Math.round(sr/freq);
  const noise=new Float32Array(period);
  for(let i=0;i<period;i++)
    noise[i]=string<=1?(Math.random()*2-1)*0.7+(i>0?noise[i-1]*0.3:0):Math.random()*2-1;
  const buf=noise.slice(); let pos=0,sample=0,bodyPrev=0;
  const damping=0.990+(string/5)*0.007, bodyFreq=120+string*60;
  const total=Math.ceil(sr*(1.5+(string/5)*2.5));
  const out=ctx.createBuffer(1,total,sr), d=out.getChannelData(0);
  for(let n=0;n<total;n++){
    const nx=(pos+1)%period;
    sample=damping*0.5*(buf[pos]+buf[nx]);
    const ba=1-Math.exp(-2*Math.PI*bodyFreq/sr);
    bodyPrev+=ba*(sample-bodyPrev); d[n]=sample+bodyPrev*0.08;
    buf[pos]=sample; pos=(pos+1)%period;
  }
  const fi=Math.min(64,total),fo=Math.min(Math.ceil(sr*0.04),total);
  for(let i=0;i<fi;i++) d[i]*=i/fi;
  for(let i=0;i<fo;i++) d[total-1-i]*=i/fo;
  const src=ctx.createBufferSource(); src.buffer=out;
  const eq=ctx.createBiquadFilter();
  if(string<=1){eq.type='lowshelf';eq.frequency.value=200;eq.gain.value=3;}
  else if(string>=4){eq.type='peaking';eq.frequency.value=900;eq.gain.value=-2;eq.Q.value=0.8;}
  else{eq.type='peaking';eq.frequency.value=400;eq.gain.value=1;eq.Q.value=1;}
  src.connect(eq); eq.connect(masterGain);
  src.start(ctx.currentTime+when);
}

function playNoteKS(s,f,when=0){ if(audioEnabled) ksPluck(OPEN_MIDI[s]+f,s,when); }

const STRUM=0.032;
function strumNotes(notes,btnEl){
  if(!audioEnabled) return;
  notes.forEach((n,i)=>playNoteKS(n.s,n.f,i*STRUM));
  if(btnEl){
    const orig=btnEl.textContent;
    btnEl.classList.add('strumming'); btnEl.textContent='♪ Playing…';
    setTimeout(()=>{ btnEl.classList.remove('strumming'); btnEl.textContent=orig; },notes.length*STRUM*1000+300);
  }
}

function toggleGlobalAudio(){
  audioEnabled=!audioEnabled;
  const btn=document.getElementById('globalAudioBtn');
  const volW=document.getElementById('globalVolWrap');
  if(audioEnabled){
    btn.textContent='🔊 On'; btn.classList.add('audio-on');
    volW.style.opacity='1'; volW.style.pointerEvents='auto';
    getAudioCtx();
  } else {
    btn.textContent='🔇 Off'; btn.classList.remove('audio-on');
    volW.style.opacity='0.35'; volW.style.pointerEvents='none';
  }
  instances.forEach(inst=>inst.render());
}

function onGlobalVolume(val){
  currentVolume=val/100;
  document.getElementById('globalVolPct').textContent=val+'%';
  const pct=val+'%';
  document.getElementById('globalVolSlider').style.background=
    `linear-gradient(to right,var(--accent) 0%,var(--accent) ${pct},var(--border) ${pct},var(--border) 100%)`;
  if(masterGain) masterGain.gain.value=currentVolume;
}
window.addEventListener('load',()=>onGlobalVolume(70));

let globalShowNotes = false;
function toggleGlobalNotes(){
  globalShowNotes = !globalShowNotes;
  const btn = document.getElementById('globalNotesBtn');
  if(globalShowNotes){ btn.textContent='♩ Notes'; btn.classList.add('toggle-active'); }
  else { btn.textContent='♩ Intervals'; btn.classList.remove('toggle-active'); }
  instances.forEach(inst => inst.render());
}

function detectChord(pcs,forcedRoot=null){
  const pcSet=[...new Set(pcs)];
  const roots=forcedRoot!==null?[forcedRoot]:Array.from({length:12},(_,i)=>i);
  let best=null,bestScore=-1;
  for(const r of roots){
    const ivs=pcSet.map(pc=>((pc-r+12)%12)).sort((a,b)=>a-b);
    for(const t of CHORD_LIBRARY){
      const tSet=new Set(t.ivs),iSet=new Set(ivs);
      if(!ivs.every(i=>tSet.has(i))) continue;
      const score=t.ivs.filter(i=>iSet.has(i)).length+(t.ivs.length===pcSet.length?10:0);
      if(score>bestScore){bestScore=score;best={root:r,template:t};}
    }
  }
  if(!best){
    const root=forcedRoot??pcSet[0];
    return{root,name:pcSet.map(p=>NOTES[p]).join('/'),labelFor:pc=>genericLabel(((pc-root+12)%12))};
  }
  const{root,template:t}=best;
  return{root,name:t.name,labelFor:pc=>{const iv=(pc-root+12)%12;return t.lb[iv]??genericLabel(iv);}};
}

let instanceCounter=0;
const instances=[];

class ChordInstance{
  constructor(id){
    this.id=id;
    this.rootShape={};
    this.displayDots={};
    this.rootOverride=null;
    this.groupElements={};
  }

  buildDOM(){
    const wrap=document.createElement('div');
    wrap.className='chord-instance'; wrap.id=`ci-${this.id}`;

    const bar=document.createElement('div');
    bar.className='chord-bar'; bar.id=`chordBar-${this.id}`;

    const nameEl=document.createElement('span');
    nameEl.className='chord-bar-name'; nameEl.id=`sName-${this.id}`;
    bar.appendChild(nameEl);

    const sp1=document.createElement('div'); sp1.className='chord-bar-spacer'; bar.appendChild(sp1);

    const rootZone=document.createElement('div'); rootZone.className='chord-bar-root';
    const rootLbl=document.createElement('span'); rootLbl.className='root-label'; rootLbl.textContent='Root';
    rootZone.appendChild(rootLbl);
    const pillsWrap=document.createElement('div'); pillsWrap.id=`rootPills-${this.id}`; pillsWrap.style.cssText='display:contents;';
    rootZone.appendChild(pillsWrap);
    bar.appendChild(rootZone);

    const sp2=document.createElement('div'); sp2.className='chord-bar-spacer'; bar.appendChild(sp2);

    const btns=document.createElement('div'); btns.className='chord-bar-btns'; btns.id=`acts-${this.id}`;
    const playBtn=document.createElement('button');
    playBtn.className='btn accent-outline'; playBtn.id=`playBtn-${this.id}`;
    playBtn.textContent='▶ Play'; playBtn.disabled=!audioEnabled;
    playBtn.addEventListener('click',()=>this.playChord());
    btns.appendChild(playBtn);
    const clearBtn=document.createElement('button');
    clearBtn.className='btn red'; clearBtn.textContent='✕ Clear';
    clearBtn.addEventListener('click',()=>this.clearAll());
    btns.appendChild(clearBtn);
    bar.appendChild(btns);
    wrap.appendChild(bar);

    const emptyEl=document.createElement('div');
    emptyEl.className='status-empty'; emptyEl.id=`emptyState-${this.id}`;
    emptyEl.textContent='Click any fret to start placing notes';
    wrap.appendChild(emptyEl);

    const fbScroll=document.createElement('div'); fbScroll.className='fb-scroll'; fbScroll.id=`fbScroll-${this.id}`;
    const fbWrap=document.createElement('div'); fbWrap.className='fb-wrap'; fbWrap.id=`fbWrap-${this.id}`;

    const fnRow=document.createElement('div'); fnRow.className='fret-nums-row';
    const spacer=document.createElement('div'); spacer.style.cssText='width:40px;flex-shrink:0'; fnRow.appendChild(spacer);
    for(let f=1;f<=NUM_FRETS;f++){
      const d=document.createElement('div');
      d.className='fret-num-cell'; d.style.width=FRET_W+'px'; d.textContent=f; fnRow.appendChild(d);
    }
    fbWrap.appendChild(fnRow);

    const fb=document.createElement('div'); fb.className='fretboard'; fb.id=`fb-${this.id}`;
    for(let si=5;si>=0;si--){
      const row=document.createElement('div');
      row.className='string-row'; row.dataset.s=si;
      if(si===5) row.classList.add('top-string');
      if(si===0) row.classList.add('bottom-string');
      const nm=document.createElement('div');
      nm.className='string-name'; nm.textContent=SNAMES[si]; nm.dataset.s=si;
      nm.addEventListener('click',()=>this.toggleNote(si,0));
      row.appendChild(nm);
      for(let f=1;f<=NUM_FRETS;f++){
        const cell=document.createElement('div');
        cell.className='fret-cell'; cell.style.width=FRET_W+'px';
        if(f===1) cell.classList.add('nut');
        cell.dataset.s=si; cell.dataset.f=f;
        cell.addEventListener('click',()=>this.toggleNote(si,f));
        if(si===5||si===3||si===0){
          const pos=si===5?'above':si===3?'middle':'below';
          if(SINGLE_MARKER_FRETS.has(f)){
            const m=document.createElement('div'); m.className=`fret-marker ${pos}`; cell.appendChild(m);
          } else if(DOUBLE_MARKER_FRETS.has(f)){
            ['left','right'].forEach(side=>{
              const m=document.createElement('div'); m.className=`fret-marker ${pos} ${side}`; cell.appendChild(m);
            });
          }
        }
        row.appendChild(cell);
      }
      if(si===5||si===0){
        const mask=document.createElement('div');
        mask.style.cssText='position:absolute;width:4px;background:#fff;z-index:3;pointer-events:none;right:-2px;'+(si===5?'top:0;height:50%':'bottom:0;height:50%')+';';
        row.appendChild(mask);
      }
      fb.appendChild(row);
    }
    fbWrap.appendChild(fb);
    fbScroll.appendChild(fbWrap);
    wrap.appendChild(fbScroll);
    document.getElementById('chordInstances').appendChild(wrap);
    this.scaleFretboard();
  }

  toggleNote(s,f){
    const key=`${s}-${f}`;
    if(this.rootShape[key]){ delete this.rootShape[key]; }
    else{
      for(const k of Object.keys(this.rootShape)){ if(+k.split('-')[0]===s) delete this.rootShape[k]; }
      this.rootShape[key]=true;
      playNoteKS(s,f,0);
    }
    this.computeAndDisplay();
  }

  clearAll(){
    this.rootShape={}; this.displayDots={}; this.rootOverride=null;
    this._hideBar(); this.render();
    this._showEmpty('Click any fret to start placing notes');
  }

  remove(){
    const el=document.getElementById(`ci-${this.id}`);
    if(el) el.remove();
    const idx=instances.indexOf(this);
    if(idx>=0) instances.splice(idx,1);
    updateRemoveButtons();
  }

  _showBar(){ document.getElementById(`chordBar-${this.id}`).style.display='flex'; document.getElementById(`emptyState-${this.id}`).style.display='none'; }
  _hideBar(){ document.getElementById(`chordBar-${this.id}`).style.display='none'; document.getElementById(`emptyState-${this.id}`).style.display='block'; }
  _showEmpty(msg){ const e=document.getElementById(`emptyState-${this.id}`); e.textContent=msg; e.style.display='block'; document.getElementById(`chordBar-${this.id}`).style.display='none'; }

  _buildRootPills(chordPCs){
    const wrap=document.getElementById(`rootPills-${this.id}`); if(!wrap) return;
    wrap.innerHTML='';
    const auto=document.createElement('span');
    auto.className='root-pill auto-pill'+(this.rootOverride===null?' selected':'');
    auto.textContent='Auto';
    auto.addEventListener('click',()=>{ this.rootOverride=null; this.computeAndDisplay(); });
    wrap.appendChild(auto);
    const inSet=new Set(chordPCs);
    for(let pc=0;pc<12;pc++){
      const pill=document.createElement('span');
      pill.className='root-pill'+(inSet.has(pc)?' in-chord':'')+(this.rootOverride===pc?' selected':'');
      pill.textContent=NOTES[pc];
      const cap=pc;
      pill.addEventListener('click',()=>{ this.rootOverride=cap; this.computeAndDisplay(); });
      wrap.appendChild(pill);
    }
  }

  playChord(){
    const keys=Object.keys(this.rootShape);
    if(!keys.length||!audioEnabled) return;
    strumNotes(keys.map(k=>{ const[s,f]=k.split('-').map(Number); return{s,f}; }).sort((a,b)=>a.s-b.s), document.getElementById(`playBtn-${this.id}`));
  }

  playInversion(groupId){
    if(!audioEnabled) return;
    const notes=[];
    for(const[key,val] of Object.entries(this.displayDots)){
      if(val.group===groupId){ const[s,f]=key.split('-').map(Number); notes.push({s,f}); }
    }
    strumNotes(notes.sort((a,b)=>a.s-b.s),null);
  }

  computeAndDisplay(){
    const keys=Object.keys(this.rootShape);
    const pb=document.getElementById(`playBtn-${this.id}`);
    if(pb) pb.disabled=!audioEnabled;

    if(keys.length===0){
      this.displayDots={}; this.render();
      this._showEmpty('Click any fret to start placing notes');
      return;
    }

    // Show just the placed notes as g0 while we figure out the chord
    this.displayDots={};
    for(const k of keys){
      const[s,f]=k.split('-').map(Number);
      this.displayDots[k]={group:0,label:NOTES[noteAt(s,f)],noteName:NOTES[noteAt(s,f)]};
    }
    this.render();

    if(keys.length===1){
      const[s,f]=keys[0].split('-').map(Number);
      this._showEmpty(`${NOTES[noteAt(s,f)]} — add more notes to detect chord`);
      return;
    }

    const playedPCs=[...new Set(keys.map(k=>{ const[s,f]=k.split('-').map(Number); return noteAt(s,f); }))];
    const{root,name,labelFor}=detectChord(playedPCs,this.rootOverride);
    const usedStrings=[...new Set(keys.map(k=>+k.split('-')[0]))].sort((a,b)=>a-b);

    // ── INVERSION GROUPING ────────────────────────────────────────────────────
    //
    // Rule: go string by string. On each string, the placed note = g0.
    // The next chord-tone fret up that string = g1. The next = g2. Etc.
    // Wrap around: after fret 23, continue from fret 0.
    // Result: exactly one dot per string per group number.
    //
    // We build displayDots fresh — one entry per (string, group).

    this.displayDots = {};

    for(const s of usedStrings){
      // The fret the user placed on this string
      const placedKey = keys.find(k => +k.split('-')[0] === s);
      if(!placedKey) continue;
      const rootF = +placedKey.split('-')[1];

      // Collect all chord-tone frets on this string, ascending
      const allFrets = [];
      for(let f = 0; f <= NUM_FRETS; f++){
        if(playedPCs.includes(noteAt(s, f))) allFrets.push(f);
      }

      // Find which index in allFrets is the placed note
      const rootIdx = allFrets.indexOf(rootF);

      // Reorder: [rootF, next up, next up, ..., wrap around]
      // i.e. allFrets[rootIdx], allFrets[rootIdx+1], ..., allFrets[end], allFrets[0], ..., allFrets[rootIdx-1]
      const ordered = [
        ...allFrets.slice(rootIdx),
        ...allFrets.slice(0, rootIdx)
      ];

      // Assign group numbers: position 0 = g0, position 1 = g1, etc.
      for(let i = 0; i < ordered.length; i++){
        const f = ordered[i];
        const group = i % NUM_GROUPS;
        const pc = noteAt(s, f);
        this.displayDots[`${s}-${f}`] = {
          group,
          label: labelFor(pc),
          noteName: NOTES[pc]
        };
      }
    }

    const rootName=NOTES[root], lock=this.rootOverride!==null;
    const nameEl=document.getElementById(`sName-${this.id}`);
    if(nameEl) nameEl.textContent=`${rootName} ${name}${lock?' ✎':''}`;

    this._buildRootPills(playedPCs);
    this._showBar();
    this.render();
  }

  render(){
    const fb=document.getElementById(`fb-${this.id}`); if(!fb) return;
    fb.querySelectorAll('.dot').forEach(d=>d.remove());
    fb.querySelectorAll('.string-name').forEach(nm=>{ nm.style.color=''; nm.style.fontWeight=''; });
    this.groupElements={};

    for(const[key,{group,label,noteName}] of Object.entries(this.displayDots)){
      const[s,f]=key.split('-').map(Number);
      const displayLabel=globalShowNotes?(noteName||NOTES[noteAt(s,f)]):label;
      const dot=document.createElement('div');
      dot.className=`dot dot-g${group}`; dot.textContent=displayLabel; dot.dataset.group=group;

      if(audioEnabled&&group>0){
        dot.classList.add('inv-clickable');
        dot.addEventListener('click',e=>{
          e.stopPropagation(); this.playInversion(group);
          (this.groupElements[group]||new Set()).forEach(el=>{
            el.style.transform='scale(1.2)';
            setTimeout(()=>{ el.style.transform=''; },180);
          });
        });
        dot.addEventListener('mouseenter',()=>this.highlightGroup(group,true));
        dot.addEventListener('mouseleave',()=>this.highlightGroup(group,false));
      }

      if(f===0){
        const nm=fb.querySelector(`.string-name[data-s="${s}"]`); if(!nm) continue;
        nm.textContent=''; nm.appendChild(dot);
      } else {
        const cell=fb.querySelector(`.fret-cell[data-s="${s}"][data-f="${f}"]`); if(!cell) continue;
        cell.appendChild(dot);
      }
      if(!this.groupElements[group]) this.groupElements[group]=new Set();
      this.groupElements[group].add(dot);
    }
    fb.querySelectorAll('.string-name').forEach(nm=>{
      if(!nm.querySelector('.dot')) nm.textContent=SNAMES[+nm.dataset.s];
    });
  }

  highlightGroup(groupId,on){
    (this.groupElements[groupId]||new Set()).forEach(dot=>{
      const p=dot.parentElement; if(!p) return;
      if(on) p.classList.add('inv-hover'); else p.classList.remove('inv-hover');
    });
  }

  scaleFretboard(){
    const wrap=document.getElementById(`fbWrap-${this.id}`);
    const scroll=document.getElementById(`fbScroll-${this.id}`);
    if(!wrap||!scroll) return;
    wrap.style.transform=''; wrap.style.marginBottom='';
    const nat=wrap.scrollWidth, avail=scroll.clientWidth;
    if(avail<nat){
      const sc=avail/nat;
      wrap.style.transform=`scale(${sc})`;
      wrap.style.transformOrigin='top left';
      wrap.style.marginBottom=`-${wrap.scrollHeight*(1-sc)}px`;
    }
  }
}

function updateRemoveButtons(){
  instances.forEach(inst=>{
    const acts=document.getElementById(`acts-${inst.id}`);
    if(!acts) return;
    acts.querySelectorAll('[data-role="remove"]').forEach(b=>b.remove());
    if(instances.length>1){
      const rmBtn=document.createElement('button');
      rmBtn.className='btn remove-btn'; rmBtn.textContent='⊗ Remove'; rmBtn.dataset.role='remove';
      rmBtn.addEventListener('click',()=>inst.remove());
      acts.appendChild(rmBtn);
    }
  });
}

function addChordInstance(){
  instanceCounter++;
  const inst=new ChordInstance(instanceCounter);
  instances.push(inst);
  inst.buildDOM();
  updateRemoveButtons();
  inst.computeAndDisplay();
  inst.scaleFretboard();
  setTimeout(()=>{ document.getElementById(`ci-${inst.id}`)?.scrollIntoView({behavior:'smooth',block:'start'}); },100);
}

window.addEventListener('resize',()=>instances.forEach(inst=>inst.scaleFretboard()));
addChordInstance();
</script>
