<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111008"/>
      <stop offset="100%" stop-color="#0a0a06"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d078"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a07828"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotglow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.4"/>

  <path d="M8,2 L24,2 L22.5,30 L9.5,30 Z" fill="#1a1008"/>

  <rect x="8" y="2" width="16" height="2.2" rx="0.5" fill="url(#gold)" filter="url(#glow)"/>

  <rect x="8.4"  y="8.5"  width="15.2" height="1.1" rx="0.4" fill="url(#gold)" opacity="0.9"/>
  <rect x="8.8"  y="14.5" width="14.4" height="1.0" rx="0.4" fill="url(#gold)" opacity="0.8"/>
  <rect x="9.2"  y="20.0" width="13.6" height="1.0" rx="0.4" fill="url(#gold)" opacity="0.7"/>
  <rect x="9.6"  y="25.0" width="12.8" height="0.9" rx="0.4" fill="url(#gold)" opacity="0.6"/>

  <line x1="10.5" y1="2" x2="10.0" y2="30" stroke="#ccc" stroke-width="0.55" opacity="0.6"/>
  <line x1="12.5" y1="2" x2="12.1" y2="30" stroke="#bbb" stroke-width="0.45" opacity="0.6"/>
  <line x1="14.5" y1="2" x2="14.2" y2="30" stroke="#aaa" stroke-width="0.40" opacity="0.6"/>
  <line x1="17.5" y1="2" x2="17.8" y2="30" stroke="#aaa" stroke-width="0.40" opacity="0.6"/>
  <line x1="19.5" y1="2" x2="19.9" y2="30" stroke="#bbb" stroke-width="0.45" opacity="0.6"/>
  <line x1="21.5" y1="2" x2="22.0" y2="30" stroke="#ccc" stroke-width="0.55" opacity="0.6"/>

  <circle cx="16" cy="17.25" r="2.4" fill="#c9a84c" filter="url(#dotglow)" opacity="0.95"/>
  <circle cx="16" cy="17.25" r="1.4" fill="#f0d078"/>
  <circle cx="15.3" cy="16.6" r="0.5" fill="#fff" opacity="0.4"/>
</svg>